<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mapa Tático</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; }

    #btnAdicionar{
      font-size: 24px;
    }

    #novoNome{
      font-size: 24px;
    }

    #tabela{
      font-size: 24px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 10px 20px;
      border: 1px solid #ccc;
      cursor: pointer;
      border-radius: 8px;
      background: #eee;
      font-size: 28px;
    }

    .tab.active {
      background: #ffd11a;
      font-weight: bold;
    }

    .content { display: none; }
    .content.active { display: block; }

    table {
      border-collapse: collapse;
      min-width: 500px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #222;
      color: white;
      padding: 12px;
    }

    td {
      padding: 12px;
      text-align: center;
      cursor: pointer;
    }

    .vivo {
      background: #d4edda;
      color: #155724;
      font-weight: bold;
    }

    .morto {
      background: #f8d7da;
      color: #721c24;
      font-weight: bold;
    }

    .delete-btn {
      color: rgb(171, 171, 171);
      font-weight: bold;
      cursor: pointer;
    }

    input {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      background: #ffd11a;
      cursor: pointer;
      font-weight: bold;
    }

    #loginBox {
      text-align: center;
      margin-top: 100px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Acesso</h2>
  <input type="text" id="chave" placeholder="Digite a chave de acesso" />
  <br><br>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div class="container" id="app" style="display:none;">

  <!-- ABAS -->
  <div class="tabs">
    <div class="tab active" data-tab="mapa">Mapa</div>
    <div class="tab" data-tab="equipe">Equipe</div>
  </div>

  <!-- MAPA -->
  <div id="mapa" class="content active">
    <div style="position: relative; width: 600px;">
      <img src="mapa.png" style="width: 100%;" />

      <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
        <circle cx="31.67%" cy="37.10%" r="5%" fill="blue" fill-opacity="0.5" class="ponto" data-nome="Municipios"/>
        <circle cx="44.00%" cy="60.16%" r="5%" fill="blue" fill-opacity="0.5" class="ponto" data-nome="Agro"/>
        <circle cx="75.67%" cy="43.83%" r="5%" fill="blue" fill-opacity="0.5" class="ponto" data-nome="MPE"/>
        <circle cx="58.67%" cy="40.25%" r="5%" fill="blue" fill-opacity="0.5" class="ponto" data-nome="MGE"/>
      </svg>
    </div>
  </div>

  <!-- EQUIPE -->
  <div id="equipe" class="content">

    <table id="tabela">
      <tr>
        <th>Combatente</th>
        <th>Situação</th>
        <th>Posição</th>
        <th></th>
      </tr>
    </table>

    <div style="margin-top: 15px; display: flex; gap: 10px;">
      <input type="text" id="novoNome" placeholder="Nome do combatente" />
      <button id="btnAdicionar">Adicionar</button>
    </div>

  </div>

</div>

<script>
// ===== SUPABASE =====
const supabaseClient = supabase.createClient(
  "https://qdxemksigqvwbrczscev.supabase.co",
  "sb_publishable_STLfngAI0fmNyl_RD83cMQ_MbdpaOAG"
);

// ===== LOGIN POR CHAVE =====
async function login() {
  const chave = document.getElementById("chave").value.trim();

  const { data, error } = await supabaseClient
    .from("acessos")
    .select("*")
    .eq("chave", chave)
    .single();

  if (error || !data) {
    alert("Chave inválida");
    return;
  }

  localStorage.setItem("acesso", chave);
  iniciarApp();
}

// 🔥 VALIDAÇÃO REAL AO CARREGAR
window.onload = async () => {
  const acesso = localStorage.getItem("acesso");

  if (!acesso) return;

  const { data } = await supabaseClient
    .from("acessos")
    .select("*")
    .eq("chave", acesso)
    .single();

  if (!data) {
    localStorage.removeItem("acesso");
    alert("Acesso expirado");
    return;
  }

  iniciarApp();
};

// iniciar app
function iniciarApp() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "flex";

  carregarPontos();
  carregarEquipe();
}

// ===== ABAS =====
document.querySelectorAll(".tab").forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));

    tab.classList.add("active");
    document.getElementById(tab.dataset.tab).classList.add("active");
  };
});

// ===== MAPA =====
const cores = ["blue", "yellow", "red"];

document.querySelectorAll(".ponto").forEach((circulo) => {
  let index = 0;

  circulo.addEventListener("click", async () => {
    index = (index + 1) % cores.length;
    const cor = cores[index];

    circulo.setAttribute("fill", cor);

    await supabaseClient
      .from("pontos_mapa")
      .upsert({
        nome: circulo.dataset.nome,
        cor: cor
      });
  });
});

async function carregarPontos() {
  const { data } = await supabaseClient.from("pontos_mapa").select("*");

  data?.forEach(p => {
    const el = document.querySelector(`[data-nome="${p.nome}"]`);
    if (el) el.setAttribute("fill", p.cor);
  });
}

// ===== EQUIPE =====
const situacoes = ["Vivo", "Morto"];
const posicoes = ["MPE", "MGE", "Municípios", "AGRO"];

function criarLinha(p) {
  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td>${p.nome}</td>
    <td class="situacao ${p.situacao.toLowerCase()}">${p.situacao}</td>
    <td class="posicao">${p.posicao}</td>
    <td class="delete-btn">✖</td>
  `;

  return tr;
}

async function carregarEquipe() {
  const { data } = await supabaseClient.from("equipe").select("*");

  const tabela = document.getElementById("tabela");

  data?.forEach(p => {
    const tr = criarLinha(p);
    tabela.appendChild(tr);
  });

  ativarEventosTabela();
}

function ativarEventosTabela() {

  document.querySelectorAll(".situacao").forEach(el => {
    let index = situacoes.indexOf(el.textContent);

    el.onclick = async () => {
      index = (index + 1) % situacoes.length;
      const valor = situacoes[index];

      el.textContent = valor;
      el.classList.remove("vivo", "morto");
      el.classList.add(valor.toLowerCase());

      const nome = el.parentElement.children[0].textContent;

      await supabaseClient
        .from("equipe")
        .update({ situacao: valor })
        .eq("nome", nome);
    };
  });

  document.querySelectorAll(".posicao").forEach(el => {
    let index = posicoes.indexOf(el.textContent);

    el.onclick = async () => {
      index = (index + 1) % posicoes.length;
      const valor = posicoes[index];

      el.textContent = valor;

      const nome = el.parentElement.children[0].textContent;

      await supabaseClient
        .from("equipe")
        .update({ posicao: valor })
        .eq("nome", nome);
    };
  });

  document.querySelectorAll(".delete-btn").forEach(el => {
    el.onclick = async () => {
      const nome = el.parentElement.children[0].textContent;

      const confirmar = confirm(`Deseja excluir ${nome}?`);
      if (!confirmar) return;

      await supabaseClient
        .from("equipe")
        .delete()
        .eq("nome", nome);

      el.parentElement.remove();
    };
  });
}

// ===== ADICIONAR =====
document.getElementById("btnAdicionar").onclick = async () => {
  const input = document.getElementById("novoNome");
  const nome = input.value.trim();

  if (!nome) return alert("Digite um nome");

  const novo = {
    nome: nome,
    situacao: "Vivo",
    posicao: "MPE"
  };

  const { data } = await supabaseClient
    .from("equipe")
    .insert([novo])
    .select();

  const tabela = document.getElementById("tabela");
  const tr = criarLinha(data[0]);
  tabela.appendChild(tr);

  ativarEventosTabela();

  input.value = "";
};

// ENTER adiciona
document.getElementById("novoNome").addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    document.getElementById("btnAdicionar").click();
  }
});
</script>

</body>
</html>
